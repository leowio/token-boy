<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="tokenboy" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/tokenboy-icon.svg" />
    <title>tokenboy</title>
    <style>
      :root {
        color: #f6d747;
        background: #000;
        font-family: "Courier New", Courier, monospace;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow: hidden;
      }

      [v-cloak] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main
      id="app"
      class="terminal"
      aria-label="Token Boy terminal"
      v-scope
      v-cloak
    >
      <section class="screen">
        <header class="tabs" aria-label="Primary navigation">
          <a
            class="screen-tool back-tool"
            href="/data.html"
            aria-label="Return to archive"
            title="Return to archive"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
          </a>

          <nav
            class="tab-list"
            aria-label="Primary tabs"
            role="tablist"
            @keydown="onTabKeydown($event)"
          >
            <a
              v-for="page in pages"
              :key="page.id"
              class="tab-button"
              :class="{ 'is-active': activePage === page.id }"
              :id="'tab-' + page.id"
              :href="page.href"
              role="tab"
              :aria-selected="activePage === page.id ? 'true' : 'false'"
            >
              {{ page.label }}
            </a>
          </nav>

          <a
            class="screen-tool camera-tool"
            :class="{ 'is-armed': hasPendingPhoto }"
            :href="cameraHref"
            aria-label="Attach place photo"
            title="Attach place photo"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"
              />
              <circle cx="12" cy="13" r="3" />
            </svg>
          </a>
        </header>

        <nav class="subtabs" aria-label="DATA navigation" role="navigation">
          <a class="subtab-button active" href="/data.html">ARCHIVE</a>
          <span class="subtab-button">{{ detailLabel }}</span>
        </nav>

        <section
          class="tab-panel data-detail-panel"
          role="tabpanel"
          aria-labelledby="tab-data"
        >
          <section v-if="!place" class="data-empty">
            <h2>{{ detailStatus }}</h2>
            <p>{{ detailHint }}</p>
            <a class="data-back-link" href="/data.html">RETURN TO ARCHIVE</a>
          </section>

          <template v-else>
            <section class="data-detail-hero">
              <div class="data-photo-frame">
                <img
                  v-if="place.photo"
                  class="data-photo"
                  :src="place.photo"
                  :alt="place.title"
                />
                <div v-else class="data-photo-placeholder">NO IMAGE</div>
              </div>

              <aside class="data-detail-meta">
                <h2>{{ place.title }}</h2>
                <p>{{ detailStatus }}</p>
                <p>ID {{ place.id }}</p>
                <p>USER {{ place.userId }}</p>
                <p>COORD {{ placeCoords }}</p>
                <p>STAMP {{ placeTimestamp }}</p>
                <a class="data-back-link" href="/data.html"
                  >RETURN TO ARCHIVE</a
                >
              </aside>
            </section>

            <article class="data-detail-body">
              <h2>DESCRIPTION</h2>
              <p>{{ placeDescription }}</p>
            </article>
          </template>
        </section>
      </section>
    </main>

    <script type="module" src="/src/data-detail.ts"></script>
  </body>
</html>
