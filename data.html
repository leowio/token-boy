<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tokenboy</title>
    <style>
      :root {
        color: #f6d747;
        background: #000;
        font-family: "Courier New", Courier, monospace;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow: hidden;
      }

      [v-cloak] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main
      id="app"
      class="terminal"
      aria-label="Token Boy terminal"
      v-scope
      v-cloak
    >
      <section class="screen">
        <header class="tabs" aria-label="Primary navigation">
          <nav
            class="tab-list"
            aria-label="Primary tabs"
            role="tablist"
            @keydown="onTabKeydown($event)"
          >
            <a
              v-for="page in pages"
              :key="page.id"
              class="tab-button"
              :class="{ 'is-active': activePage === page.id }"
              :id="'tab-' + page.id"
              :href="page.href"
              role="tab"
              :aria-selected="activePage === page.id ? 'true' : 'false'"
            >
              {{ page.label }}
            </a>
          </nav>

          <a
            class="screen-tool camera-tool"
            :class="{ 'is-armed': hasPendingPhoto }"
            :href="cameraHref"
            aria-label="Attach place photo"
            title="Attach place photo"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"
              />
              <circle cx="12" cy="13" r="3" />
            </svg>
          </a>
        </header>

        <nav class="subtabs" aria-label="DATA navigation" role="tablist">
          <button
            v-for="(subtab, index) in activeSubtabs"
            :key="subtab"
            type="button"
            class="subtab-button"
            :class="{ active: isSubtabActive(subtab) }"
            :data-subtab="subtab"
            role="tab"
            :aria-selected="isSubtabActive(subtab) ? 'true' : 'false'"
            @click="setActiveSubtab(subtab)"
            @keydown="onSubtabKeydown($event, index)"
          >
            {{ subtab }}
          </button>
        </nav>

        <section
          class="tab-panel data-panel"
          role="tabpanel"
          aria-labelledby="tab-data"
        >
          <section class="data-browser" aria-label="Data archive">
            <section v-if="isLoading" class="data-empty">
              <h2>SYNCING</h2>
              <p>LOADING ARCHIVE</p>
            </section>

            <section v-else-if="visibleEntries.length === 0" class="data-empty">
              <h2>{{ dataStatus }}</h2>
              <p>{{ detailHint }}</p>
            </section>

            <div
              v-else
              class="data-table"
              role="table"
              aria-label="Place archive"
            >
              <div class="data-table-head" role="row">
                <span>TITLE</span>
                <span>OWNER</span>
                <span>COORD</span>
                <span>STAMP</span>
              </div>

              <a
                v-for="entry in visibleEntries"
                :key="entry.id"
                class="data-row"
                :href="entry.href"
                role="row"
              >
                <div class="data-row-main">
                  <strong>{{ entry.title }}</strong>
                  <p>{{ entry.summary }}</p>
                </div>
                <span>{{ entry.owner }}</span>
                <span>{{ entry.coords }}</span>
                <span>{{ entry.timestamp }}</span>
              </a>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="/src/data.ts"></script>
  </body>
</html>
