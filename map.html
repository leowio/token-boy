<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="tokenboy" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/tokenboy-icon.svg" />
    <title>tokenboy</title>
    <style>
      :root {
        color: #f6d747;
        background: #000;
        font-family: "Courier New", Courier, monospace;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow: hidden;
      }

      [v-cloak] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main
      id="app"
      class="terminal"
      aria-label="Token Boy terminal"
      v-scope
      v-cloak
    >
      <section class="screen is-map-view">
        <header class="tabs" aria-label="Primary navigation">
          <nav
            class="tab-list"
            aria-label="Primary tabs"
            role="tablist"
            @keydown="onTabKeydown($event)"
          >
            <a
              v-for="page in pages"
              :key="page.id"
              class="tab-button"
              :class="{ 'is-active': activePage === page.id }"
              :id="'tab-' + page.id"
              :href="page.href"
              role="tab"
              :aria-selected="activePage === page.id ? 'true' : 'false'"
            >
              {{ page.label }}
            </a>
          </nav>

          <a
            class="screen-tool camera-tool"
            :class="{ 'is-armed': hasPendingPhoto }"
            :href="cameraHref"
            aria-label="Attach place photo"
            title="Attach place photo"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"
              />
              <circle cx="12" cy="13" r="3" />
            </svg>
          </a>
        </header>

        <nav class="subtabs" aria-label="MAP navigation" role="tablist">
          <button
            v-for="(subtab, index) in activeSubtabs"
            :key="subtab"
            type="button"
            class="subtab-button"
            :class="{ active: isSubtabActive(subtab) }"
            :data-subtab="subtab"
            role="tab"
            :aria-selected="isSubtabActive(subtab) ? 'true' : 'false'"
            @click="setActiveSubtab(subtab)"
            @keydown="onSubtabKeydown($event, index)"
          >
            {{ subtab }}
          </button>
        </nav>

        <section
          class="tab-panel map-panel"
          :class="{ 'is-world': activeSubtab === 'WORLD' }"
          role="tabpanel"
          aria-labelledby="tab-map"
        >
          <div class="map-frame" aria-label="Shared map">
            <div id="vault-map" class="vault-map"></div>
            <div class="map-reticle" aria-hidden="true"></div>
          </div>

          <aside class="map-readout">
            <h2>{{ mapHeading }}</h2>
            <p>{{ mapStatus }}</p>
            <p>{{ mapCoordsText }}</p>
            <p>{{ mapPinsText }}</p>
            <p>{{ mapUserText }}</p>
            <p>{{ mapZoomText }}</p>
          </aside>
        </section>
      </section>
    </main>

    <script type="module" src="/src/map.ts"></script>
  </body>
</html>
